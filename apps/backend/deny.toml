# cargo-deny — Rust supply-chain / security gate (this repo's "Security Rating A"
# equivalent, replacing Sonar which cannot analyze Rust).
# Run locally:  cd apps/backend && cargo deny check

[advisories]
version = 2
# Deny crates with known RUSTSEC security advisories + yanked crates -> Security A.
yanked = "deny"
# ignore = ["RUSTSEC-XXXX-XXXX"]  # add a justified, time-boxed exception only if forced

[bans]
# Dependency-version duplication. Kept "warn" because transitive deps frequently pull
# multiple versions of a crate (outside our control) — a hard "deny" reds CI on day one
# and needs a curated skip-list. Flip to "deny" after reviewing `cargo tree --duplicates`
# and adding any unavoidable dups to `skip`. NOTE: *code* duplication is hard-gated
# separately by jscpd in CI (the "no duplication" gate).
multiple-versions = "warn"
wildcards = "deny"   # no `version = "*"` dependencies
# skip = [{ name = "windows-sys" }]  # example: add unavoidable transitive dups here

[licenses]
version = 2
# Permissive licenses only. If cargo-deny flags a transitive dep whose license is not
# listed, add it here (after confirming it is acceptable).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]

[sources]
unknown-registry = "deny"   # crates.io only
unknown-git = "deny"        # no unvetted git dependencies
