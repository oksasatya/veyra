name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  boundary-check:
    name: Hexagonal boundary guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check layer boundaries
        run: bash .github/scripts/check-boundaries.sh

  test:
    name: Tests + coverage (>=90%)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: veyra
          POSTGRES_PASSWORD: veyra
          POSTGRES_DB: veyra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/backend
      - name: fmt
        run: cd apps/backend && cargo fmt --check
      - name: clippy
        run: cd apps/backend && cargo clippy --all-targets --all-features -- -D warnings
      - name: Install nextest + llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: nextest,cargo-llvm-cov
      - name: Tests + coverage gate (>=90% lines)
        env:
          DATABASE_URL: postgres://veyra:veyra@localhost:5432/veyra
          JWT_SECRET: ci-test-secret-that-is-at-least-32-chars
        run: |
          cd apps/backend
          cargo llvm-cov nextest --all-features \
            --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests/|main\.rs)' \
            --fail-under-lines 90
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/backend/lcov.info
          # The hard 90% gate above is authoritative; Codecov upload is best-effort
          # (badge + PR comment). Fork PRs have no token, so never fail CI on upload.
          fail_ci_if_error: false

  deny:
    name: cargo-deny (security A + bans + licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: apps/backend/Cargo.toml
          command: check
