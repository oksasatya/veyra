<!-- @dsCard group="Components" name="Button" subtitle="Filled, ghost, disabled, two sizes" width="920" height="480" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veyra · Button</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600&family=IBM+Plex+Sans:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#0D1119; --surface:#151A23; --border:#232B36; --text:#E6EAF0; --text-muted:#9BA6B5; --accent:#F26A21; --accent-hover:#FF8338; }
  * { box-sizing:border-box; }
  body { margin:0; padding:40px; background:var(--bg); color:var(--text); font-family:"IBM Plex Sans", system-ui, sans-serif; }
  .eyebrow { font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--text-muted); margin:0 0 6px; }
  h1 { font-family:Sora, sans-serif; font-weight:600; font-size:28px; margin:0 0 28px; letter-spacing:-.01em; }
  .group { display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:14px; }
  .tag { width:120px; flex:none; font-family:"IBM Plex Mono", monospace; font-size:12px; color:var(--text-muted); }
  .btn { font-family:"IBM Plex Sans", sans-serif; font-weight:600; font-size:15px; border-radius:12px;
    padding:12px 22px; border:1px solid transparent; cursor:pointer; transition:background .15s, border-color .15s; }
  .btn-sm { font-size:13px; padding:9px 16px; border-radius:10px; }
  .filled { background:var(--accent); color:#0D1119; }
  .filled:hover { background:var(--accent-hover); }
  .ghost { background:transparent; color:var(--text); border-color:var(--border); }
  .ghost:hover { border-color:var(--accent); color:var(--accent); }
  .disabled { background:#2A2F38; color:#5A6472; cursor:not-allowed; }
</style>
</head>
<body>
  <p class="eyebrow">Components</p>
  <h1>Button</h1>
  <div class="group"><span class="tag">Filled</span>
    <button class="btn filled">Add vehicle</button>
    <button class="btn filled btn-sm">Add vehicle</button>
  </div>
  <div class="group"><span class="tag">Ghost</span>
    <button class="btn ghost">Cancel</button>
    <button class="btn ghost btn-sm">Cancel</button>
  </div>
  <div class="group"><span class="tag">Disabled</span>
    <button class="btn disabled" disabled>Saving</button>
    <button class="btn disabled btn-sm" disabled>Saving</button>
  </div>
</body>
</html>
