<!-- @dsCard group="States" name="Error — Offline" subtitle="Network error + retry, 390x844" width="390" height="844" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veyra · Error</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#0D1119; --surface:#151A23; --surface-2:#1B212C; --border:#232B36; --text:#E6EAF0; --muted:#9BA6B5; --accent:#F26A21; --accent-hover:#FF8338; --danger:#F2555A; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { width:390px; height:844px; }
  body { background:var(--bg); color:var(--text); font-family:"IBM Plex Sans",system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow:hidden; position:relative; }
  .statusbar { display:flex; justify-content:space-between; align-items:center; padding:14px 24px 0; font-size:13px; font-weight:600; }
  .statusbar .icons { display:flex; gap:6px; opacity:.9; }
  header { padding:8px 20px; }
  header h1 { font-family:Sora,sans-serif; font-size:30px; font-weight:700; letter-spacing:-.02em; }
  .err { height:calc(844px - 56px - 56px); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 36px; text-align:center; }
  .art { width:96px; height:96px; border-radius:26px; background:var(--surface); border:1px solid var(--border);
    display:grid; place-items:center; margin-bottom:24px; color:var(--danger); }
  .err h2 { font-family:Sora,sans-serif; font-size:21px; font-weight:600; }
  .err p { color:var(--muted); font-size:15px; line-height:1.55; margin-top:10px; max-width:32ch; }
  .trace { margin-top:16px; font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--muted);
    background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:9px 13px; }
  .actions { margin-top:26px; display:flex; flex-direction:column; gap:11px; width:100%; max-width:280px; }
  .retry { height:52px; border:none; border-radius:14px; background:var(--accent); color:#0D1119; font-family:inherit; font-weight:600; font-size:16px; display:inline-flex; align-items:center; justify-content:center; gap:9px; }
  .ghost { height:50px; border-radius:14px; background:transparent; border:1px solid var(--border); color:var(--text); font-family:inherit; font-weight:500; font-size:15px; }
  .home-ind { position:absolute; bottom:9px; left:50%; transform:translateX(-50%); width:134px; height:5px; border-radius:3px; background:rgba(230,234,240,.28); }
</style>
</head>
<body>
  <div class="statusbar"><span>9:41</span><span class="icons">􀙥 ▮▮ 􀛨</span></div>
  <header><h1>Garage</h1></header>
  <div class="err">
    <div class="art">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 10h1a4 4 0 0 1 .5 8H7a5 5 0 0 1-1.3-9.8"/><path d="M5 5l14 14"/></svg>
    </div>
    <h2>Can't reach Veyra</h2>
    <p>We couldn't load your garage. Check your connection, then try again.</p>
    <div class="trace">error: network unreachable</div>
    <div class="actions">
      <button class="retry">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0D1119" stroke-width="2.2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 4v4h4"/></svg>
        Try again
      </button>
      <button class="ghost">Check server settings</button>
    </div>
  </div>
  <div class="home-ind"></div>
</body>
</html>
