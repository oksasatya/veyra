<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Veyra · Documents</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  :root { --bg:#0D1119; --surface:#151A23; --surface-2:#1B212C; --border:#232B36;
    --text:#E6EAF0; --muted:#9BA6B5; --accent:#F26A21; --danger:#F2555A; --ok:#4FD08A; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { width:390px; height:844px; }
  body { background:var(--bg); color:var(--text); font-family:"IBM Plex Sans",system-ui,sans-serif; -webkit-font-smoothing:antialiased; overflow:hidden; position:relative; }
  .mono { font-family:"IBM Plex Mono",monospace; }
  .statusbar { display:flex; justify-content:space-between; align-items:center; padding:14px 24px 0; font-size:13px; font-weight:600; }
  .statusbar .icons { display:flex; gap:6px; opacity:.9; }
  header { padding:8px 20px 4px; display:flex; align-items:flex-end; justify-content:space-between; }
  header h1 { font-family:Sora,sans-serif; font-size:30px; font-weight:700; letter-spacing:-.02em; }
  header .sub { color:var(--muted); font-size:13px; margin-top:4px; }
  .scroll { height:calc(844px - 56px - 64px - 78px); overflow:hidden; padding:14px 20px 0; }
  .doc { display:flex; align-items:center; gap:14px; background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:15px; margin-bottom:12px; }
  .thumb { width:46px; height:46px; border-radius:12px; flex:none; display:grid; place-items:center; background:var(--surface-2); border:1px solid var(--border); }
  .body { flex:1; min-width:0; }
  .t { font-weight:600; font-size:15px; }
  .m { color:var(--muted); font-size:12px; margin-top:4px; }
  .pill { flex:none; font-size:11px; font-weight:600; padding:5px 10px; border-radius:999px; }
  .pill.ok { background:rgba(79,208,138,.14); color:var(--ok); border:1px solid rgba(79,208,138,.28); }
  .pill.soon { background:rgba(242,106,33,.14); color:var(--accent); border:1px solid rgba(242,106,33,.32); }
  .pill.exp { background:rgba(242,85,90,.14); color:var(--danger); border:1px solid rgba(242,85,90,.3); }
  .pill.none { background:var(--surface-2); color:var(--muted); border:1px solid var(--border); }
  .tabbar { position:absolute; bottom:0; left:0; right:0; height:78px; background:rgba(13,17,25,.86);
    backdrop-filter:blur(12px); border-top:1px solid var(--border); display:flex; padding:8px 8px 22px; }
  .tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--muted); font-size:11px; font-weight:500; }
  .tab.active { color:var(--accent); }
  .home-ind { position:absolute; bottom:9px; left:50%; transform:translateX(-50%); width:134px; height:5px; border-radius:3px; background:rgba(230,234,240,.28); }
</style>
</head>

    <div class="tab active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5"/></svg>Docs</div>
    <div class="tab"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.3-2.5h-4l-.3 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.3 2.5h4l.3-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.6a7 7 0 0 0 .1-1z"/></svg>Settings</div>

</body>
</html>
